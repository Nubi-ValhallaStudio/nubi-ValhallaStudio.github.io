<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nubi App UI Pro</title>
<style>
:root{
  --bg:#cfd9e6;
  --card:rgba(255,255,255,0.3);
  --text:#111;
  --btn:#4f6f94;
  --line:#9fb3c8;
}
.dark{
  --bg:#0f1720;
  --card:rgba(30,40,55,0.5);
  --text:#fff;
  --btn:#2f3f55;
  --line:#2f3f55;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}
header img{width:100%;height:145px;object-fit:cover;}
.container{
  max-width:700px;
  margin:40px auto;
  padding:25px;
  border-radius:25px;
  backdrop-filter:blur(18px);
  background:var(--card);
  box-shadow:0 25px 50px rgba(0,0,0,0.2);
}
.section{margin-bottom:25px;opacity:0;transform:translateY(20px);transition:0.5s;}
.section.show{opacity:1;transform:translateY(0);}
label{font-weight:600;display:block;margin-bottom:6px;}
input, textarea, select{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.2);
  color:var(--text);
}
input::placeholder, textarea::placeholder{color:#888;}
input:focus, textarea:focus{outline:none;box-shadow:0 0 12px var(--btn);} 
button{
  background:var(--btn);
  color:#fff;
  padding:15px;
  border:none;
  width:100%;
  border-radius:16px;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
button img{width:20px;}
.footer{text-align:center;margin:60px 0;opacity:0.7;}
.top-icons{position:fixed;top:10px;right:10px;display:flex;gap:10px;z-index:1000;}
.top-icons img{width:28px;cursor:pointer;}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;flex-direction:column;color:#fff;transition:opacity 1.5s;}
.fade-out{opacity:0;pointer-events:none;}
.nubi{width:120px;animation:float 3s infinite ease-in-out;}
@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-10px);}100%{transform:translateY(0);}}
.hidden{display:none;}
@media (min-width:900px){
  .container{max-width:800px;padding:40px;}
}
</style>
</head>
<body><header>
<img src="imagenes/banner.png" id="banner">
</header><div class="top-icons">
<img src="imagenes/modo_claro.png" id="modo">
<img src="imagenes/perfil.png" id="perfil">
<img src="imagenes/info.png" id="info">
</div><div class="overlay" id="overlay">
<img src="imagenes/nubi.png" class="nubi">
<p id="texto"></p>
</div><div class="container hidden" id="formulario"><div class="section">
<label>💼 Nombre del trabajo</label>
<input id="trabajo" placeholder="(trabajo, tema, contenido, unidad)">
</div><div class="section">
<label>📚 Materia</label>
<input id="materia" list="materias" placeholder="(Biología / Ciencias...)">
<datalist id="materias">
<option value="Biología">
<option value="Matemáticas">
<option value="Historia">
<option value="Ciencias de la educación">
</datalist>
</div><div class="section">
<label>👥 Integrantes</label>
<div id="integrantes"></div>
<button onclick="add()">Agregar integ.</button>
</div><div class="section">
<label>🎓 Grado</label>
<input id="grado" placeholder="(secundaria o universidad)">
</div><div class="section">
<label>🏫 Grupo</label>
<input id="grupo" placeholder="(Grupo 2 / 10-G)">
</div><div class="section">
<label>👨‍🏫 Maestro</label>
<input id="maestro" placeholder="(Lic. Vanessa)">
</div><div class="section">
<label>🏢 Institución</label>
<input id="institucion" placeholder="(Nombre del colegio)">
</div><div class="section">
<label>🕒 Turno</label>
<input id="turno" placeholder="(Matutino, sabatino...)">
</div><div class="section">
<label>📅 Fecha</label>
<input id="fecha" placeholder="(19 octubre 2026)">
</div><div class="section">
<label>🌐 Información</label>
<select id="tipo">
<option value="Internet">Internet</option>
<option value="PDF">PDF</option>
</select>
</div><div class="section">
<label>📝 Extras</label>
<textarea id="extra" placeholder="(indicaciones adicionales)"></textarea>
</div><button onclick="send()">
<img src="imagenes/whatsapp.png"> Enviar a WhatsApp
</button><div class="footer">Valhalla Studio © 2026</div></div><script>
let textos=["Hola, soy nubi , bienvenido","Rellena este formulario por favor"];
let i=0, stop=false;

function show(){
if(i<textos.length && !stop){
document.getElementById('texto').innerText=textos[i++];
setTimeout(show,2000);
}else end();
}
function end(){
document.getElementById('overlay').classList.add('fade-out');
setTimeout(()=>{
document.getElementById('overlay').classList.add('hidden');
document.getElementById('formulario').classList.remove('hidden');
animar();
},1500);
}
document.addEventListener('click',()=>{stop=true;end();});
show();

function animar(){
let sec=document.querySelectorAll('.section');
sec.forEach((s,i)=>{
setTimeout(()=>s.classList.add('show'), i*180);
});
}

function add(){
let input=document.createElement('input');
input.placeholder='(Nombre del integrante)';
document.getElementById('integrantes').appendChild(input);
}

function send(){
let names=[...document.querySelectorAll('#integrantes input')].map(i=>i.value).join(', ');
let msg=`Estas es la información y tus respuestas del formulario anterior, usamos este medio para facilitar tu trabajo y así enviarlo a este mismo medio de contacto, con esto tenemos más comodidad contigo, estudiante.\n\n💼 Trabajo: ${trabajo.value}\n📚 Materia: ${materia.value}\n👥 Integrantes: ${names}\n🎓 Grado: ${grado.value}\n🏫 Grupo: ${grupo.value}\n👨‍🏫 Maestro: ${maestro.value}\n🏢 Institución: ${institucion.value}\n🕒 Turno: ${turno.value}\n📅 Fecha: ${fecha.value}\n🌐 Tipo: ${tipo.value}\n📝 Extras: ${extra.value}\n\nEste metodo lo hemos elegido para obtener tu medio de contacto, de este forma es más eficiente, cómodo y nos ayuda a ajustar o modificar la información por si algo te ha echo falta.\n\nImportante: si elegiste que la información en la página es privada o especifica pueden mandarlo a este mismo medio de contacto.\n\n☁: Estamos trabajando en tú página, estará lista en 24hrs 🤗😉`;

window.open("https://wa.me/50584627889?text="+encodeURIComponent(msg));
}

let modo=document.getElementById('modo');
let banner=document.getElementById('banner');
modo.onclick=()=>{
  document.body.classList.toggle('dark');
  if(document.body.classList.contains('dark')){
    modo.src="imagenes/modo_oscuro.png";
    perfil.src="imagenes/perfil_mo.png";
    info.src="imagenes/info_mo.png";
    banner.src="imagenes/banner_mo.png";
  }else{
    modo.src="imagenes/modo_claro.png";
    perfil.src="imagenes/perfil.png";
    info.src="imagenes/info.png";
    banner.src="imagenes/banner.png";
  }
};
</script></body>
</html>
